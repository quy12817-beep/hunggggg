<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang của Hùng</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            text-align: center;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            color: #ff4d4d;
        }

        button {
            background: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Xin chào 👋</h1>
    <p>T là Hùng</p>
    <p>Đây là trang web đầu tiên của t</p>

    <button onclick="alert('Cảm ơn  mấy con tuất đã xem!')">
        Nhấn vào đây
    </button>
</div>

</body>
</html>
